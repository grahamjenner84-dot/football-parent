  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ll{font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;cursor:pointer;border-radius:6px;padding:4px 8px;border:1px solid #2a2a2f;background:#16161a;color:#9a9a93}\n  .pill.on{background:#E6B53D;color:#0b0b0d;border-color:#E6B53D}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"min-height:100vh;background:#0b0b0d;color:#eaeaea;font-family:Helvetica,Arial,sans-serif;display:flex;flex-direction:column\">\n\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:15px 24px;border-bottom:1px solid #1d1d20;background:#0e0e11;flex:none\">\n    <div style=\"display:flex;align-items:center;gap:13px\">\n      <div style=\"width:13px;height:34px;background:#E6B53D;border-radius:2px\"><\u002Fdiv>\n      <div>\n        <div style=\"font-weight:800;font-size:18px;letter-spacing:-.3px\">Football Parent — Single Slide Builder<\u002Fdiv>\n        <div style=\"font-size:12px;color:#8a8a8a;margin-top:2px\">One-slide posts → Instagram &amp; TikTok ready 9:16 Reels and PNGs. Mark a word with *asterisks*.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px\">\n      <span class=\"ar\" style=\"font-size:11px;color:#7d7d77;font-weight:600;margin-right:2px\">PREVIEW &amp; HANDLE<\u002Fspan>\n      <button class=\"seg {{ igOn }}\" onclick=\"{{ setIG }}\">📷 Instagram<\u002Fbutton>\n      <button class=\"seg {{ tkOn }}\" onclick=\"{{ setTK }}\">🎵 TikTok<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;display:flex;gap:0;min-height:0;flex-wrap:wrap\">\n\n    <div style=\"flex:1;min-width:340px;display:flex;flex-direction:column;border-right:1px solid #1d1d20;padding:22px 22px 30px;overflow:auto\">\n      <div class=\"ar\" style=\"font-size:13px;color:#bdbdbd;line-height:1.6;margin-bottom:9px\">Paste one joke per line — <b style=\"color:#E6B53D\">setup / punchline<\u002Fb>. Wrap the word to highlight in <b style=\"color:#E6B53D\">*asterisks*<\u002Fb>. Start a line with <b>A:<\u002Fb> or <b>C:<\u002Fb> to set its style.<\u002Fdiv>\n      <textarea value=\"{{ pasteText }}\" onchange=\"{{ onPaste }}\" spellcheck=\"false\" placeholder=\"Football parents don't have weekends. / We have *fixtures*.\nC: Nobody warned me / the *kit washing* never ends.\" style=\"width:100%;height:150px;background:#0e0e11;color:#e6e6e6;border:1px solid #2a2a2f;border-radius:10px;padding:13px;font-size:13px;line-height:1.55;resize:vertical\"><\u002Ftextarea>\n      <div style=\"display:flex;gap:10px;margin-top:13px;flex-wrap:wrap\">\n        <button onclick=\"{{ onParse }}\" style=\"background:#E6B53D;color:#0b0b0d;border:none;padding:12px 24px;border-radius:9px;font-size:14px;font-weight:800;cursor:pointer\">Build jokes →<\u002Fbutton>\n        <button onclick=\"{{ onSample }}\" class=\"ar\" style=\"background:#1a1a1e;color:#eaeaea;border:1px solid #2a2a2f;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer\">Load examples<\u002Fbutton>\n        <button onclick=\"{{ copyPrompt }}\" class=\"ar\" style=\"background:#16161a;color:#E6B53D;border:1px solid #E6B53D;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer\">{{ copyLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ar\" style=\"font-size:11.5px;color:#7d7d77;line-height:1.5;margin-top:8px\">Need jokes? Copy the prompt, paste it into Claude with your themes, then paste the jokes it returns back here.<\u002Fdiv>\n\n      <div class=\"ar\" style=\"margin-top:24px;font-size:12px;font-weight:800;color:#E6B53D;letter-spacing:.04em;text-transform:uppercase\">{{ jokeCountLabel }}<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:11px\">\n        <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n          <div class=\"jrow {{ r.activeClass }}\" onclick=\"{{ r.select }}\">\n            <div style=\"flex:1;min-width:0\">\n              <div class=\"ar\" style=\"font-size:12px;color:#8a8a8a;line-height:1.4\">{{ r.setup }}<\u002Fdiv>\n              <div class=\"ar\" style=\"font-size:13.5px;color:#fff;font-weight:700;line-height:1.4;margin-top:2px\">{{ r.punchline }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:5px;flex:none\">\n              <button class=\"pill {{ r.aOn }}\" onclick=\"{{ r.toA }}\">A<\u002Fbutton>\n              <button class=\"pill {{ r.cOn }}\" onclick=\"{{ r.toC }}\">C<\u002Fbutton>\n              <button class=\"pill\" onclick=\"{{ r.del }}\" style=\"color:#c77\">✕<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1.1;min-width:360px;display:flex;flex-direction:column;align-items:center;padding:24px;overflow:auto\">\n      <canvas ref=\"{{ previewRef }}\" width=\"1080\" height=\"1920\" style=\"width:300px;height:auto;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5);display:block;background:#0b0b0d\"><\u002Fcanvas>\n      <button class=\"seg {{ safeOn }}\" onclick=\"{{ toggleSafe }}\" style=\"margin-top:12px;padding:7px 15px\">{{ safeLabel }}<\u002Fbutton>\n      <div class=\"ar\" style=\"font-size:11px;color:#7d7d77;line-height:1.45;margin-top:7px;max-width:300px;text-align:center\">Text stays inside the green box — clear of the caption, top bar and the right-side like/share buttons. The overlay is a guide only; it's never exported.<\u002Fdiv>\n\n      <div style=\"width:100%;max-width:340px;margin-top:18px\">\n        <label class=\"ar\" style=\"font-size:11px;font-weight:700;color:#8a8a8a;letter-spacing:.04em;text-transform:uppercase\">Setup<\u002Flabel>\n        <input value=\"{{ activeSetup }}\" onchange=\"{{ editSetup }}\" placeholder=\"(optional)\" style=\"width:100%;margin-top:5px;background:#0e0e11;color:#e6e6e6;border:1px solid #2a2a2f;border-radius:8px;padding:10px 12px;font-size:13px\">\n        <label class=\"ar\" style=\"font-size:11px;font-weight:700;color:#8a8a8a;letter-spacing:.04em;text-transform:uppercase;display:block;margin-top:13px\">Punchline <span style=\"color:#6f6f6f;font-weight:600;text-transform:none\">— *word* = gold<\u002Fspan><\u002Flabel>\n        <input value=\"{{ activePunch }}\" onchange=\"{{ editPunch }}\" style=\"width:100%;margin-top:5px;background:#0e0e11;color:#e6e6e6;border:1px solid #2a2a2f;border-radius:8px;padding:10px 12px;font-size:13px\">\n        <div style=\"display:flex;gap:8px;margin-top:13px;align-items:center\">\n          <span class=\"ar\" style=\"font-size:11px;font-weight:700;color:#8a8a8a;letter-spacing:.04em;text-transform:uppercase\">Style<\u002Fspan>\n          <button class=\"seg {{ aStyleOn }}\" onclick=\"{{ activeToA }}\" style=\"padding:7px 16px\">A · Dark<\u002Fbutton>\n          <button class=\"seg {{ cStyleOn }}\" onclick=\"{{ activeToC }}\" style=\"padding:7px 16px\">C · Cream<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"width:100%;max-width:340px;margin-top:22px;padding-top:18px;border-top:1px solid #1d1d20;display:flex;flex-direction:column;gap:10px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n          <span class=\"ar\" style=\"font-size:11px;font-weight:700;color:#8a8a8a;letter-spacing:.04em;text-transform:uppercase\">Reel length<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:7px\">\n            <input type=\"number\" min=\"2\" max=\"15\" step=\"1\" value=\"{{ secs }}\" onchange=\"{{ editSecs }}\" style=\"width:64px;background:#0e0e11;color:#e6e6e6;border:1px solid #2a2a2f;border-radius:8px;padding:8px 10px;font-size:13px;text-align:center\">\n            <span class=\"ar\" style=\"font-size:12px;color:#8a8a8a\">seconds<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ exportOneVideo }}\" style=\"background:#E6B53D;color:#0b0b0d;border:none;padding:13px;border-radius:9px;font-size:14px;font-weight:800;cursor:pointer\">▶  This joke — Reel (.mp4)<\u002Fbutton>\n        <button onclick=\"{{ exportAllVideo }}\" class=\"ar\" style=\"background:#16161a;color:#eaeaea;border:1px solid #E6B53D;padding:12px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer\">▶  All jokes — {{ platformLabel }} Reels (.zip)<\u002Fbutton>\n        <div class=\"ar\" style=\"font-size:11px;color:#7d7d77;line-height:1.45;text-align:center;margin:2px 0\">Post the .mp4 as a Reel / TikTok. Want a feed photo instead? Grab the PNG below.<\u002Fdiv>\n        <button onclick=\"{{ exportOne }}\" class=\"ar\" style=\"background:#1a1a1e;color:#cfcfcf;border:1px solid #2a2a2f;padding:11px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer\">⬇  This joke — photo (.png)<\u002Fbutton>\n        <button onclick=\"{{ exportBoth }}\" class=\"ar\" style=\"background:#1a1a1e;color:#cfcfcf;border:1px solid #2a2a2f;padding:11px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer\">⬇  All jokes — PNG, both platforms (.zip)<\u002Fbutton>\n        <div class=\"ar\" style=\"font-size:12px;color:#E6B53D;min-height:16px;text-align:center\">{{ status }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.previewRef = React.createRef();\n    const saved = this.load();\n    this.state = {\n      pasteText: saved.pasteText || '',\n      jokes: saved.jokes || this.sampleJokes(),\n      active: 0,\n      platform: 'ig',\n      showSafe: false,\n      secs: 4,\n      status: '',\n      fontsReady: false\n    };\n  }\n  /* ---------- persistence ---------- */\n  load(){ try{ return JSON.parse(localStorage.getItem('fp_joke_builder')||'{}'); }catch(e){ return {}; } }\n  persist(){ try{ localStorage.setItem('fp_joke_builder', JSON.stringify({pasteText:this.state.pasteText, jokes:this.state.jokes})); }catch(e){} }\n\n  componentDidMount(){\n    this.ensureFonts().then(()=>{ this.setState({fontsReady:true}, ()=>this.redraw()); });\n    this.redraw();\n  }\n  componentDidUpdate(){ this.redraw(); }\n  async ensureFonts(){\n    try{\n      const specs=[\"400 100px 'Anton'\",\"700 40px 'Archivo'\",\"800 40px 'Archivo'\",\"600 40px 'Spline Sans Mono'\"];\n      await Promise.all(specs.map(s=>document.fonts.load(s)));\n      await document.fonts.ready;\n    }catch(e){}\n  }\n\n  /* ---------- data ---------- */\n  sampleJokes(){\n    return [\n      {setup:\"Football parents don't have weekends.\", punch:\"We have *fixtures*.\", layout:'A'},\n      {setup:\"Other parents: \\u201cHow was your weekend?\\u201d\", punch:\"Me: \\u201c4-3, we *equalised* in the 89th.\\u201d\", layout:'A'},\n      {setup:\"Nobody warned me\", punch:\"the *kit washing* never ends.\", layout:'C'},\n      {setup:\"I don't have a social life.\", punch:\"I have a car boot full of *cones*.\", layout:'A'},\n      {setup:\"My Saturday step count:\", punch:\"*18,000* \\u2014 all sideline pacing.\", layout:'C'}\n    ];\n  }\n  handleFor(p){ return p==='tiktok' ? '@footballparent' : '@football.parent'; }\n  platformName(p){ return p==='tiktok' ? 'TikTok' : 'Instagram'; }\n\n  async copyPrompt(){\n    this.setState({copyMsg:'Copying\\u2026'});\n    const txt=this.promptText();\n    try{\n      await navigator.clipboard.writeText(txt);\n      this.setState({copyMsg:'copied'});\n    }catch(e){\n      // clipboard blocked (e.g. insecure context) — fall back to a manual textarea copy\n      try{\n        const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();\n        this.setState({copyMsg:'copied'});\n      }catch(e2){ this.setState({copyMsg:'failed'}); }\n    }\n    clearTimeout(this._copyT); this._copyT=setTimeout(()=>this.setState({copyMsg:''}),2200);\n  }\n  promptText(){ return Component.PROMPT; }\n  onPaste(e){ this.setState({pasteText:e.target.value}); }\n  onSample(){ const j=this.sampleJokes(); this.setState({jokes:j, active:0, pasteText:this.toPaste(j)}, ()=>this.persist()); }\n  toPaste(jokes){ return jokes.map(j=>(j.layout==='C'?'C: ':'')+(j.setup?j.setup+' / ':'')+j.punch).join('\\n'); }\n  onParse(){\n    const lines=String(this.state.pasteText).split('\\n').map(l=>l.trim()).filter(Boolean);\n    const jokes=lines.map(line=>{\n      let layout='A'; let rest=line;\n      const m=line.match(/^([AC])\\s*[:\\-]\\s*/i);\n      if(m){ layout=m[1].toUpperCase(); rest=line.slice(m[0].length); }\n      const parts=rest.split(/\\s+\\/\\s+/);\n      let setup='', punch=rest;\n      if(parts.length>=2){ punch=parts.pop(); setup=parts.join(' / '); }\n      return {setup:setup, punch:punch, layout:layout};\n    });\n    if(!jokes.length) return;\n    this.setState({jokes:jokes, active:0}, ()=>this.persist());\n  }\n\n  setActive(i){ this.setState({active:i}); }\n  setLayout(i,l){ const j=this.state.jokes.slice(); j[i]=Object.assign({},j[i],{layout:l}); this.setState({jokes:j, pasteText:this.toPaste(j)}, ()=>this.persist()); }\n  del(i){ const j=this.state.jokes.slice(); j.splice(i,1); const a=Math.max(0,Math.min(this.state.active, j.length-1)); this.setState({jokes:j, active:a, pasteText:this.toPaste(j)}, ()=>this.persist()); }\n  editField(field,val){ const i=this.state.active; const j=this.state.jokes.slice(); if(!j[i]) return; j[i]=Object.assign({},j[i],{[field]:val}); this.setState({jokes:j, pasteText:this.toPaste(j)}, ()=>this.persist()); }\n\n  /* ---------- text helpers ---------- */\n  words(text){\n    // whole-word accent: any space-delimited word containing * is highlighted; strip the *\n    return String(text).toUpperCase().split(/\\s+/).filter(Boolean).map(w=>({\n      t: w.replace(/\\*/g,''),\n      a: w.indexOf('*')!==-1\n    }));\n  }\n  wrapWords(ctx, words, maxW, space){\n    const lines=[]; let line=[],w=0;\n    for(const word of words){ const ww=ctx.measureText(word.t).width; const add=(line.length?space:0)+ww;\n      if(w+add>maxW && line.length){ lines.push(line); line=[word]; w=ww; } else { line.push(word); w+=add; } }\n    if(line.length) lines.push(line); return lines;\n  }\n  drawLines(ctx, lines, anchorX, y, lineH, align, space, base, accent){\n    ctx.textAlign='left'; // we position words manually; centering handled via x offset\n    let yy=y;\n    for(const line of lines){\n      let lw=0; line.forEach((wd,i)=>{ lw+=ctx.measureText(wd.t).width+(i?space:0); });\n      let x = align==='center' ? anchorX-lw/2 : anchorX;\n      line.forEach((wd,i)=>{ if(i) x+=space; ctx.fillStyle=wd.a?accent:base; ctx.fillText(wd.t,x,yy); x+=ctx.measureText(wd.t).width; });\n      yy+=lineH;\n    }\n    return yy;\n  }\n  fit(ctx, paras, maxW, maxH, hi, lo, lhR, gap){\n    for(let s=hi;s>=lo;s-=2){\n      ctx.font=\"400 \"+s+\"px 'Anton'\"; const space=ctx.measureText(' ').width;\n      let totalLines=0; const wrapped=[];\n      for(const p of paras){ if(!p.length){ continue; } const ls=this.wrapWords(ctx,p,maxW,space); wrapped.push(ls); totalLines+=ls.length; }\n      const lineH=s*lhR;\n      const h=totalLines*lineH + (wrapped.length>1?(wrapped.length-1)*gap:0);\n      if(h<=maxH) return {size:s, lineH:lineH, space:space, wrapped:wrapped, height:h};\n    }\n    ctx.font=\"400 \"+lo+\"px 'Anton'\"; const space=ctx.measureText(' ').width;\n    const wrapped=paras.filter(p=>p.length).map(p=>this.wrapWords(ctx,p,maxW,space));\n    const lineH=lo*lhR; const h=wrapped.reduce((a,l)=>a+l.length,0)*lineH+(wrapped.length>1?(wrapped.length-1)*gap:0);\n    return {size:lo,lineH:lineH,space:space,wrapped:wrapped,height:h};\n  }\n\n  /* ---------- slide drawing ---------- */\n  drawJoke(ctx, joke, platform){\n    const W=1080,H=1920;\n    if(joke.layout==='C') return this.drawCream(ctx,joke,platform,W,H);\n    return this.drawDark(ctx,joke,platform,W,H);\n  }\n  eyebrow(ctx, color, x, y){\n    ctx.font=\"600 26px 'Spline Sans Mono'\"; ctx.fillStyle=color; ctx.textAlign='left'; ctx.textBaseline='alphabetic';\n    const str='\\u25A0  FOOTBALLPARENT.CO.UK'; const extra=5; let cx=x;\n    for(const ch of str){ ctx.fillText(ch, cx, y); cx += ctx.measureText(ch).width + extra; }\n  }\n  // Platform-safe geometry (matches the weekly builder: top 250, side 96, extra-right 96, bottom 220).\n  // Keeps text clear of TikTok/Instagram top bars, the bottom caption, and the right-side action buttons.\n  safe(){ const W=1080,H=1920,side=96,extraR=96,top=250,bot=220; const leftX=side, rightEdge=W-side-extraR; return {W,H,leftX,rightEdge,maxW:rightEdge-leftX,centerX:(leftX+rightEdge)/2,safeTop:top,safeBottom:H-bot}; }\n  footer(ctx, platform, S, dark){\n    const cx=S.centerX; const y=S.safeBottom-140;\n    ctx.save();\n    ctx.strokeStyle = dark ? 'rgba(255,255,255,.14)' : 'rgba(22,20,15,.16)';\n    ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(S.leftX,y); ctx.lineTo(S.rightEdge,y); ctx.stroke();\n    ctx.textAlign='center'; ctx.textBaseline='alphabetic';\n    ctx.font=\"800 40px 'Archivo'\"; ctx.fillStyle = dark ? '#ffffff' : '#16140f';\n    ctx.fillText(this.handleFor(platform), cx, y+60);\n    ctx.font=\"600 32px 'Archivo'\"; ctx.fillStyle = dark ? '#9a9a93' : '#9a7d1e';\n    ctx.fillText('Tag a football parent \\uD83D\\uDC47  \\u00B7  Follow for more', cx, y+108);\n    ctx.restore();\n  }\n  drawDark(ctx,joke,platform,W,H){\n    const S=this.safe();\n    let g=ctx.createRadialGradient(W/2,360,0,W/2,360,1180);\n    g.addColorStop(0,'#24241f'); g.addColorStop(.42,'#121215'); g.addColorStop(1,'#0b0b0d');\n    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);\n    let glow=ctx.createRadialGradient(S.centerX,210,0,S.centerX,210,540);\n    glow.addColorStop(0,'rgba(230,181,61,.18)'); glow.addColorStop(1,'rgba(230,181,61,0)');\n    ctx.fillStyle=glow; ctx.fillRect(0,0,W,560);\n    this.eyebrow(ctx,'#E6B53D',S.leftX,S.safeTop+44);\n    ctx.textAlign='center'; ctx.textBaseline='top';\n    const sWords=this.words(joke.setup), pWords=this.words(joke.punch);\n    const paras=[sWords,pWords].filter(p=>p.length);\n    const bandTop=S.safeTop+150, bandBot=S.safeBottom-260, bandH=bandBot-bandTop;\n    const f=this.fit(ctx,paras,S.maxW,bandH,120,52,1.02,40);\n    ctx.font=\"400 \"+f.size+\"px 'Anton'\";\n    let yy=bandTop+(bandH-f.height)/2;\n    f.wrapped.forEach((ls,pi)=>{ yy=this.drawLines(ctx,ls,S.centerX,yy,f.lineH,'center',f.space,'#ffffff','#E6B53D'); if(pi<f.wrapped.length-1) yy+=40; });\n    this.footer(ctx,platform,S,true);\n  }\n  drawCream(ctx,joke,platform,W,H){\n    const S=this.safe();\n    ctx.fillStyle='#ECE6D8'; ctx.fillRect(0,0,W,H);\n    this.eyebrow(ctx,'#9a7d1e',S.leftX,S.safeTop+44);\n    const allWords=this.words((joke.setup?joke.setup+' ':'')+joke.punch);\n    ctx.textBaseline='top';\n    const bandTop=S.safeTop+150, bandBot=S.safeBottom-260, bandH=bandBot-bandTop;\n    const qH=170;\n    const f=this.fit(ctx,[allWords],S.maxW,bandH-qH,118,52,1.04,0);\n    const groupH=qH+f.height;\n    let qy=bandTop+(bandH-groupH)/2;\n    ctx.font=\"400 200px 'Anton'\"; ctx.fillStyle='#E6B53D'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';\n    ctx.fillText('\\u201C', S.leftX-6, qy+150);\n    ctx.textBaseline='top'; ctx.font=\"400 \"+f.size+\"px 'Anton'\";\n    this.drawLines(ctx,f.wrapped[0],S.leftX,qy+qH,f.lineH,'left',f.space,'#16140f','#c69214');\n    this.footer(ctx,platform,S,false);\n  }\n  drawSafeOverlay(ctx){\n    const S=this.safe();\n    ctx.save();\n    ctx.fillStyle='rgba(229,72,77,0.18)';\n    ctx.fillRect(0,0,S.W,S.safeTop);\n    ctx.fillRect(0,S.safeBottom,S.W,S.H-S.safeBottom);\n    ctx.fillRect(S.rightEdge,1000,S.W-S.rightEdge,S.safeBottom-1000);\n    ctx.strokeStyle='rgba(82,196,128,0.95)'; ctx.setLineDash([16,11]); ctx.lineWidth=3;\n    ctx.strokeRect(S.leftX,S.safeTop,S.maxW,S.safeBottom-S.safeTop);\n    ctx.setLineDash([]);\n    ctx.fillStyle='rgba(82,196,128,0.95)'; ctx.font=\"600 24px 'Spline Sans Mono'\"; ctx.textAlign='left'; ctx.textBaseline='top';\n    ctx.fillText('SAFE AREA', S.leftX+8, S.safeTop+8);\n    ctx.fillStyle='rgba(255,180,184,0.95)'; ctx.textAlign='right';\n    ctx.fillText('BUTTONS', S.W-12, 1010);\n    ctx.restore();\n  }\n\n  redraw(){\n    const cv=this.previewRef.current; if(!cv) return;\n    const ctx=cv.getContext('2d');\n    const joke=this.state.jokes[this.state.active];\n    ctx.clearRect(0,0,1080,1920);\n    if(!joke){ ctx.fillStyle='#0b0b0d'; ctx.fillRect(0,0,1080,1920); return; }\n    this.drawJoke(ctx,joke,this.state.platform);\n    if(this.state.showSafe) this.drawSafeOverlay(ctx);\n  }\n\n  /* ---------- export ---------- */\n  download(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},1000); }\n  pad(n){ return String(n).padStart(2,'0'); }\n  async renderBlob(joke,platform){\n    const cv=document.createElement('canvas'); cv.width=1080; cv.height=1920;\n    const ctx=cv.getContext('2d'); this.drawJoke(ctx,joke,platform);\n    return await new Promise(r=>cv.toBlob(r,'image/png'));\n  }\n  /* ---------- video (static slide → short MP4 Reel) ---------- */\n  async encodeJokeMP4(joke, platform, secs){\n    if(!(window.VideoEncoder && window.Mp4Muxer)) return null;\n    const fps=30, total=Math.max(1,Math.round(secs*fps));\n    const codecs=['avc1.640028','avc1.4d0028','avc1.42001f']; let codec=null;\n    for(const c of codecs){ try{ const s=await VideoEncoder.isConfigSupported({codec:c,width:1080,height:1920,bitrate:12000000,framerate:fps}); if(s&&s.supported){ codec=c; break; } }catch(e){} }\n    if(!codec) return null;\n    const muxer=new Mp4Muxer.Muxer({ target:new Mp4Muxer.ArrayBufferTarget(), video:{codec:'avc',width:1080,height:1920}, fastStart:'in-memory' });\n    const encoder=new VideoEncoder({ output:(chunk,meta)=>muxer.addVideoChunk(chunk,meta), error:e=>console.error(e) });\n    encoder.configure({ codec, width:1080, height:1920, bitrate:12000000, framerate:fps });\n    const cv=document.createElement('canvas'); cv.width=1080; cv.height=1920; const ctx=cv.getContext('2d');\n    this.drawJoke(ctx,joke,platform);\n    for(let f=0; f<total; f++){\n      const frame=new VideoFrame(cv, { timestamp:Math.round(f*1e6/fps), duration:Math.round(1e6/fps) });\n      encoder.encode(frame, { keyFrame: f % (fps*2) === 0 }); frame.close();\n      if(encoder.encodeQueueSize>8){ while(encoder.encodeQueueSize>4){ await new Promise(r=>setTimeout(r,3)); } }\n    }\n    await encoder.flush(); muxer.finalize();\n    return new Blob([muxer.target.buffer], {type:'video/mp4'});\n  }\n  async renderJokeVideo(joke, platform, secs){\n    try{ const b=await this.encodeJokeMP4(joke,platform,secs); if(b) return {blob:b, ext:'mp4'}; }catch(e){ console.warn('WebCodecs failed, falling back', e); }\n    const types=['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];\n    const mime=window.MediaRecorder?types.find(t=>{try{return MediaRecorder.isTypeSupported(t);}catch(e){return false;}}):null;\n    if(!mime) return null;\n    const ext=mime.indexOf('mp4')>=0?'mp4':'webm';\n    const cv=document.createElement('canvas'); cv.width=1080; cv.height=1920; const ctx=cv.getContext('2d');\n    this.drawJoke(ctx,joke,platform);\n    const stream=cv.captureStream(30);\n    const rec=new MediaRecorder(stream,{mimeType:mime, videoBitsPerSecond:12000000});\n    const chunks=[]; rec.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };\n    const stopped=new Promise(r=>rec.onstop=r);\n    rec.start();\n    const iv=setInterval(()=>this.drawJoke(ctx,joke,platform),100);\n    await new Promise(r=>setTimeout(r,Math.max(1,secs)*1000));\n    clearInterval(iv); rec.stop(); await stopped;\n    return {blob:new Blob(chunks,{type:mime}), ext};\n  }\n  async exportOneVideo(){\n    if(!this.state.jokes.length) return;\n    await this.ensureFonts();\n    const joke=this.state.jokes[this.state.active]; const p=this.state.platform;\n    this.setState({status:'\\u25CF Encoding Reel\\u2026 keep this tab open.'});\n    const r=await this.renderJokeVideo(joke,p,this.state.secs);\n    if(!r){ this.setState({status:'\\u26A0 Video isn\\u2019t supported in this browser \\u2014 use Chrome/Edge, or download the PNG.'}); return; }\n    this.download(r.blob,'joke-'+this.pad(this.state.active+1)+'-'+joke.layout+'-'+p+'.'+r.ext);\n    this.setState({status:'\\u2713 Reel downloaded ('+r.ext.toUpperCase()+', 1080\\u00D71920, '+this.state.secs+'s).'+(r.ext==='webm'?' (WebM \\u2014 Chrome/Edge make MP4; both platforms accept WebM on upload.)':'')});\n  }\n  async exportAllVideo(){\n    if(!window.JSZip){ this.setState({status:'Zip still loading \\u2014 try again in a second.'}); return; }\n    if(!this.state.jokes.length) return;\n    const p=this.state.platform; let anyWebm=false;\n    await this.ensureFonts();\n    const zip=new JSZip();\n    for(let i=0;i<this.state.jokes.length;i++){\n      this.setState({status:'\\u25CF Encoding Reels \\u2014 '+(i+1)+'/'+this.state.jokes.length+'\\u2026'});\n      const j=this.state.jokes[i]; const r=await this.renderJokeVideo(j,p,this.state.secs);\n      if(!r){ this.setState({status:'\\u26A0 Video isn\\u2019t supported in this browser \\u2014 use Chrome/Edge, or download PNGs.'}); return; }\n      if(r.ext==='webm') anyWebm=true;\n      zip.file('joke-'+this.pad(i+1)+'-'+j.layout+'.'+r.ext, r.blob);\n    }\n    const out=await zip.generateAsync({type:'blob'});\n    this.download(out,'footballparent-joke-reels-'+p+'.zip');\n    this.setState({status:'\\u2713 Downloaded '+this.state.jokes.length+' Reels'+(anyWebm?' (some WebM \\u2014 Chrome/Edge make MP4).':' (MP4, 1080\\u00D71920).')});\n  }\n  async exportOne(){\n    if(!this.state.jokes.length) return;\n    await this.ensureFonts();\n    const joke=this.state.jokes[this.state.active];\n    const blob=await this.renderBlob(joke,this.state.platform);\n    this.download(blob,'joke-'+this.pad(this.state.active+1)+'-'+joke.layout+'-'+this.state.platform+'.png');\n    this.setState({status:'\\u2713 Saved 1 PNG.'});\n  }\n  async exportAll(){\n    if(!window.JSZip){ this.setState({status:'Zip still loading \\u2014 try again in a second.'}); return; }\n    if(!this.state.jokes.length) return;\n    const p=this.state.platform;\n    this.setState({status:'Building '+this.state.jokes.length+' PNGs for '+this.platformName(p)+'\\u2026'});\n    await this.ensureFonts();\n    const zip=new JSZip();\n    for(let i=0;i<this.state.jokes.length;i++){ const j=this.state.jokes[i]; const blob=await this.renderBlob(j,p); zip.file('joke-'+this.pad(i+1)+'-'+j.layout+'.png',blob); }\n    const out=await zip.generateAsync({type:'blob'});\n    this.download(out,'footballparent-jokes-'+p+'.zip');\n    this.setState({status:'\\u2713 Downloaded '+this.state.jokes.length+' PNGs.'});\n  }\n  async exportBoth(){\n    if(!window.JSZip){ this.setState({status:'Zip still loading \\u2014 try again in a second.'}); return; }\n    if(!this.state.jokes.length) return;\n    this.setState({status:'Building both platforms\\u2026'});\n    await this.ensureFonts();\n    const zip=new JSZip();\n    for(const p of ['ig','tiktok']){ const folder=zip.folder(p==='ig'?'instagram':'tiktok'); for(let i=0;i<this.state.jokes.length;i++){ const j=this.state.jokes[i]; const blob=await this.renderBlob(j,p); folder.file('joke-'+this.pad(i+1)+'-'+j.layout+'.png',blob); } }\n    const out=await zip.generateAsync({type:'blob'});\n    this.download(out,'footballparent-jokes-both.zip');\n    this.setState({status:'\\u2713 Downloaded '+(this.state.jokes.length*2)+' PNGs.'});\n  }\n\n  renderVals(){\n    const st=this.state; const active=st.jokes[st.active]||{setup:'',punch:'',layout:'A'};\n    const rows=st.jokes.map((j,i)=>({\n      setup: j.setup || '(no setup)',\n      punchline: j.punch,\n      activeClass: i===st.active ? 'active' : '',\n      aOn: j.layout==='A' ? 'on' : '',\n      cOn: j.layout==='C' ? 'on' : '',\n      select: ()=>this.setActive(i),\n      toA: (e)=>{ e.stopPropagation(); this.setLayout(i,'A'); },\n      toC: (e)=>{ e.stopPropagation(); this.setLayout(i,'C'); },\n      del: (e)=>{ e.stopPropagation(); this.del(i); }\n    }));\n    return {\n      pasteText: st.pasteText,\n      onPaste: (e)=>this.onPaste(e),\n      onParse: ()=>this.onParse(),\n      onSample: ()=>this.onSample(),\n      copyPrompt: ()=>this.copyPrompt(),\n      copyLabel: st.copyMsg==='copied' ? '\\u2713 Prompt copied' : st.copyMsg==='failed' ? 'Copy failed \\u2014 try again' : st.copyMsg==='Copying\\u2026' ? 'Copying\\u2026' : '\\uD83D\\uDCCB Copy Claude prompt',\n      rows: rows,\n      jokeCountLabel: st.jokes.length ? (st.jokes.length+' joke'+(st.jokes.length>1?'s':'')+' \\u00b7 tap to preview') : 'No jokes yet',\n      igOn: st.platform==='ig'?'on':'', tkOn: st.platform==='tiktok'?'on':'',\n      setIG: ()=>this.setState({platform:'ig'}), setTK: ()=>this.setState({platform:'tiktok'}),\n      previewRef: this.previewRef,\n      safeOn: st.showSafe?'on':'', safeLabel: st.showSafe?'\\u2713 Safe area shown':'Show safe area',\n      toggleSafe: ()=>this.setState({showSafe:!this.state.showSafe}),\n      activeSetup: active.setup, activePunch: active.punch,\n      editSetup: (e)=>this.editField('setup',e.target.value),\n      editPunch: (e)=>this.editField('punch',e.target.value),\n      aStyleOn: active.layout==='A'?'on':'', cStyleOn: active.layout==='C'?'on':'',\n      activeToA: ()=>this.setLayout(st.active,'A'), activeToC: ()=>this.setLayout(st.active,'C'),\n      platformLabel: this.platformName(st.platform),\n      exportAll: ()=>this.exportAll(), exportBoth: ()=>this.exportBoth(), exportOne: ()=>this.exportOne(),\n      exportOneVideo: ()=>this.exportOneVideo(), exportAllVideo: ()=>this.exportAllVideo(),\n      secs: st.secs, editSecs: (e)=>{ const v=Math.max(2,Math.min(15,parseInt(e.target.value,10)||4)); this.setState({secs:v}); },\n      status: st.status\n    };\n  }\n}\nComponent.PROMPT = `You are writing one-slide posts for \"Football Parent\", a UK page about youth football. These are short, relatable jokes that get posted as 9:16 Reels and TikToks. Your output pastes straight into the Football Parent SINGLE SLIDE BUILDER, so the format below must be followed exactly.\n\nABOUT FOOTBALL PARENT\nFootball Parent is run by a UK football parent and FA Level 2 coach with real experience of grassroots and academy football, including paid development centres. It is honest, parent-to-parent, never a brand or coach voice. The jokes should sound like a knowing wink between parents who live the same touchline life.\n\nAUDIENCE\nUK football parents aged 30 to 50, predominantly mothers. Their child plays grassroots or academy football. They are emotionally invested, time poor, and proud but exhausted. The best jokes make them think \"that is SO me\" and tag another parent.\n\nPRIMARY GOAL\nFollows, saves and shares. Each joke should trigger one of:\n- \"That is literally my life\" identity recognition that drives follows and tags\n- \"Send this to [name]\" instant share to another football parent\n- A genuine laugh of recognition, never a groan\n\nWHAT MAKES THESE JOKES WORK\n- Relatable truth, slightly exaggerated. The humour comes from a real, specific football-parent experience, not a generic sports gag.\n- Setup builds an expectation; punchline subverts or deadpans it.\n- Specific beats vague. \"We have fixtures\" lands harder than \"we are busy\". Name the cones, the 8am kick-off, the kit wash, the silent drive home, the away-game postcode you cannot pronounce, the half-time oranges, the WhatsApp group, the studs in the hallway.\n- Self-deprecating and warm. Laugh WITH football parents, never at the kids or other parents.\n- One clean idea per joke. If it needs explaining, cut it.\n\nTHEMES TO DRAW FROM (mix across the batch)\n- No weekends / no social life / time swallowed by football\n- The endless kit washing, boot drama, lost shinpads, studs everywhere\n- Early kick-offs, far-away grounds, freezing touchlines, British weather\n- The team WhatsApp group and its chaos\n- The emotional rollercoaster: the silent drive home, the comparison, the 89th-minute equaliser\n- Spending money: boots, subs, petrol, tournament entry, the snack bar\n- Being a part-time taxi, kit man, physio, sports psychologist and caterer\n- Tournaments, pre-season, summer heat, half-term \"holidays\" that are actually football\n\nTHE FORMAT (this is what you output, follow it precisely)\n- ONE joke per line. Nothing else on the line.\n- Each line is: setup / punchline\n  The \" / \" (space slash space) splits the setup from the punchline. The setup is the build-up; the punchline is the laugh.\n- A joke can be punchline-only (no setup). If so, just write the punchline with no slash.\n- Wrap EXACTLY ONE word in *asterisks* to highlight it in the brand gold. Pick the funniest or most surprising word, usually in the punchline. Output the literal * characters as plain text. Do NOT bold or italicise, do NOT drop the asterisks.\n- Start a line with \"A:\" or \"C:\" to choose the slide style:\n    A: = dark \"floodlit\" slide (the default punchy look). Use for most jokes.\n    C: = cream \"quote card\" slide. Use occasionally (roughly 1 in 4) for jokes that read like a wry observation or motto, to vary the feed.\n  If you omit the prefix it defaults to A.\n\nLENGTH LIMITS (so text fits the 9:16 frame without shrinking)\n- Whole joke (setup + punchline together): keep it tight, max about 22 words.\n- Setup: max ~12 words. Punchline: max ~10 words. Shorter is funnier.\n- The builder does not shrink text to fit, so do not overrun.\n\nWORKED EXAMPLES (note the single asterisked word and the A:/C: prefixes)\nFootball parents don't have weekends. / We have *fixtures*.\nOther parents: \"How was your weekend?\" / Me: \"4-3, we *equalised* in the 89th.\"\nC: Nobody warned me / the *kit washing* never ends.\nI don't have a social life. / I have a car boot full of *cones*.\nC: My Saturday step count: / *18,000*, all sideline pacing.\n\"Just a quick game,\" they said. / It's a 90-minute round trip to *Slough*.\nMy weekend lie-in ended / the day he signed his *first* registration form.\n\nWHAT TO AVOID\n- Generic sport jokes that could apply to any activity. Be football and UK specific.\n- Punching down at children, other parents, coaches or refs (light ref jokes are fine if warm).\n- Em dashes anywhere in the copy.\n- More than one asterisked word per line.\n- Two-sentence setups that overflow the frame.\n- Emoji inside the joke text (emoji belong only in the caption).\n\nOUTPUT STRUCTURE\nProduce TWO sections.\n\nSECTION 1 JOKES (for the Single Slide Builder)\nOutput all the jokes, one per line, inside a single plain code block so the asterisks and the A:/C: prefixes are preserved exactly and nothing gets auto-formatted. This block must contain ONLY the jokes, so it can be pasted straight into the builder with no editing.\n\nSECTION 2 CAPTIONS AND HASHTAGS\nFor each joke, in the same order, produce:\n\nINSTAGRAM:\nA 2 to 4 line caption in plain, warm, parent-to-parent tone. Open with a relatable hook line. Include a tag-a-parent or share prompt (this is what spreads these). One or two emoji is fine. No em dashes.\nExactly 5 hashtags. Choose the most relevant from this core set and add one specific to the joke's theme:\n#footballparents #grassrootsfootball #footballfamily #soccermom #sundayleague #footballmum #footballdad #youthfootball #footballuk #touchlineparent\n\nTIKTOK:\nA shorter 1 to 2 line caption, same warm parent-to-parent tone. End with a tag or share prompt. One emoji is fine. No em dashes.\nUp to 8 hashtags from the core set plus topic specific ones:\n#footballparents #grassrootsfootball #footballfamily #soccermom #sundayleague #footballmum #footballdad #youthfootball #footballuk #touchlineparent #fyp #footballtiktok\n\nNumber each caption to match its joke (Joke 1, Joke 2, ...).\n\nNow write <N> jokes on: <your themes here, or say \"a mix\">.`;\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
